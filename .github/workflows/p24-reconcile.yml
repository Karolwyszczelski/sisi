name: P24 Reconcile
on:
  schedule:
    - cron: "*/5 * * * *"   # co 5 min
  workflow_dispatch:
jobs:
  call:
    runs-on: ubuntu-latest
    steps:
      - name: Ping reconcile endpoint
        run: |
          curl -fsS \
            --retry 3 \
            --retry-delay 5 \
            --retry-connrefused \
            --max-time 30 \
            --connect-timeout 10 \
            "https://www.sisiciechanow.pl/api/p24/reconcile?token=${{ secrets.CRON_SECRET }}"
